{% include base_path %}


<div class="{{ include.type | default: "list" }}__item">
  <article class="archive__item" itemscope itemtype="http://schema.org/CreativeWork">
	  <p>{{ post.citation }} {% if post.link-type != nil %} <a href="{{ post.link }}">[{% if post.link-type == 'pdf' %}PDF{% endif %}{% if post.link-type == 'doi' %}DOI{% endif %}{% if post.link-type == 'draft' %}draft{% endif %}{% if post.link-type == 'slides' %}slides{% endif %}]</a>{% endif %}</p>
  </article>
</div>
